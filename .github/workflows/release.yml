name: Release

on:
  push:
    branches:
      - master
  # Drives publish-canary below — every PR gets a real npm canary publish of
  # whichever publishable package(s) it touches, gated by the canary-publish
  # environment's required reviewers before anything actually hits the registry.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      cut-release:
        description: 'Cut a release: open a version-bump PR from this branch into master (run this dispatched from develop)'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Same three jobs ci.yml runs for fast PR feedback, re-run here so `needs:
  # checks` below is a real gate on THIS workflow run — GitHub Actions has no
  # cross-workflow `needs`, so gating release/publish-canary on ci.yml's own
  # run isn't possible; calling the shared workflow again is the mechanism.
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  release:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "chore: version packages" PR when unreleased changesets
      # exist on master; once that PR is merged, this same step runs `publish`
      # instead and pushes the bumped packages to npm.
      - name: Version or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action creates one GitHub Release per published package by
      # default (no built-in grouping option exists as of 2026 - see
      # changesets/action#504, still unmerged). We disable that above and
      # create a single dated release listing every package bumped in this run.
      - name: Create combined GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          BODY=$(echo "$PACKAGES" | node -e '
            const pkgs = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(pkgs.map(p => `- ${p.name}@${p.version}`).join("\n"));
          ')
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "Release ${DATE}" \
            --notes "$BODY"

  # Manual: dispatched with the `develop` branch selected, opens a version-bump
  # PR from that branch straight into master (changesets/action's `branch`
  # input sets the PR's base — the checkout stays on whatever branch the
  # dispatch ran against, so no hardcoded ref here). Only versions, never
  # publishes: the existing push-to-master `release` job below picks up the
  # merge of that PR (no pending changesets left → it publishes directly).
  cut-release:
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.cut-release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Open version-bump PR into master
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          branch: master
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Automatic, real npm publish (dist-tag `canary`) of whichever @symbiote-native/*
  # package(s) a PR actually touches — replaces the old manual pkg.pr.new checkbox
  # flow so examples/*/package.json can commit a literal, git-tracked
  # `"@symbiote-native/<pkg>": "canary"` dependency that always resolves live,
  # something pkg.pr.new's ephemeral per-commit URLs couldn't give us. Gated by the
  # `canary-publish` GitHub Environment (required reviewers configured on the
  # environment itself) since this is a real, OIDC-trusted publish to the real
  # registry triggered by any contributor's PR.
  publish-canary:
    needs: checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: canary-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run prepublish-build

      # Auto-detects which publishable package(s) this PR touches instead of a
      # human ticking checkboxes — fails fast if the PR touches none.
      - name: Resolve changed publishable packages
        id: dirs
        env:
          CANARY_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CANARY_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/select-canary-dirs.mjs

      # npm's OIDC trust (`npm trust github`, see trust-publishers.mjs) can only be
      # registered for a package that already exists on the registry — refuse to
      # let a never-published package reach `changeset publish` and 404 there.
      - name: Preflight — verify npm trust for selected packages
        env:
          CANARY_PACKAGES: ${{ steps.dirs.outputs.packages }}
        run: node scripts/check-canary-trust.mjs

      - name: Publish canary (npm, tag canary)
        run: pnpm run release:canary
